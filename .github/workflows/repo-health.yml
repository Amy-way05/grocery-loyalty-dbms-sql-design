name: Repository Health

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  doctor:
    name: Validate repository structure and schema
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y sqlite3

      - name: Run doctor
        run: make doctor
